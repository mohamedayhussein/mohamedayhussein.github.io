<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools & Skills — Mohamed Hussein</title>
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #5c5a56;
    --text-tertiary: #8a8780;
    --border: #e5e2dc;
    --border-light: #eeebe6;

    --done: #2d8a4e;
    --done-bg: #e8f5ed;
    --needs-improvement: #c67b1a;
    --needs-improvement-bg: #fef3e2;
    --wip: #2563b3;
    --wip-bg: #e8f0fe;
    --planned: #7a7770;
    --planned-bg: #f0ede8;

    --radius: 10px;
    --radius-sm: 6px;
    --radius-pill: 100px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --transition: 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ─── HEADER ─── */
  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  header .container {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ─── FILTER BAR ─── */
  .filters {
    padding: 16px 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    min-width: 52px;
    flex-shrink: 0;
  }

  .filter-btn {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    font-family: inherit;
  }

  .filter-btn:hover {
    border-color: var(--text-tertiary);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .filter-btn[data-status="done"].active { background: var(--done); border-color: var(--done); color: #fff; }
  .filter-btn[data-status="needs-improvement"].active { background: var(--needs-improvement); border-color: var(--needs-improvement); color: #fff; }
  .filter-btn[data-status="wip"].active { background: var(--wip); border-color: var(--wip); color: #fff; }
  .filter-btn[data-status="planned"].active { background: var(--planned); border-color: var(--planned); color: #fff; }

  /* ─── TABLE ─── */
  .table-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: 80px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background var(--transition);
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover {
    background: #f8f6f2;
  }

  tbody tr.expandable {
    cursor: pointer;
  }

  tbody td {
    padding: 12px 16px;
    vertical-align: top;
  }

  .col-name {
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  .col-name .skill-thumb {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    object-fit: cover;
    vertical-align: middle;
    margin-right: 8px;
    border: 1px solid var(--border-light);
  }

  .col-name .expand-icon {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 6px;
    vertical-align: -1px;
    color: var(--text-tertiary);
    transition: transform 0.2s ease;
  }

  tr.expanded .col-name .expand-icon {
    transform: rotate(90deg);
  }

  .col-desc {
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .col-notes {
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.5;
    max-width: 250px;
  }

  .col-notes:empty::after {
    content: '—';
    color: var(--border);
  }

  /* ─── BADGES ─── */
  .badge-status {
    display: inline-flex;
    align-items: center;
    padding: 2px 9px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .badge-status.done { background: var(--done-bg); color: var(--done); }
  .badge-status.needs-improvement { background: var(--needs-improvement-bg); color: var(--needs-improvement); }
  .badge-status.wip { background: var(--wip-bg); color: var(--wip); }
  .badge-status.planned { background: var(--planned-bg); color: var(--planned); }

  .badge-type {
    display: inline-flex;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* ─── EXPANDED DETAIL ROW ─── */
  .detail-row {
    display: none;
  }

  .detail-row.visible {
    display: table-row;
  }

  .detail-row td {
    padding: 0 16px 16px 36px;
    background: #faf8f5;
    border-bottom: 1px solid var(--border);
  }

  .detail-content {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    padding-top: 4px;
    align-items: start;
  }

  .detail-left {
    flex-shrink: 0;
  }

  .detail-right {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 0;
  }

  .detail-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }

  .detail-image {
    width: 280px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }

  .detail-description {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  @media (max-width: 700px) {
    .detail-content {
      grid-template-columns: 1fr;
    }
    .detail-image {
      width: 100%;
      max-width: 280px;
    }
  }

  .detail-link a,
  .detail-examples a {
    font-size: 13px;
    color: var(--wip);
    text-decoration: none;
    font-weight: 500;
    word-break: break-all;
  }

  .detail-link a:hover,
  .detail-examples a:hover {
    text-decoration: underline;
  }

  .detail-examples ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .detail-examples li::before {
    content: '\2192';
    margin-right: 6px;
    color: var(--text-tertiary);
    font-size: 12px;
  }

  /* ─── A/B COMPARISON ─── */
  .comparison-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .comparison-col {
    padding: 12px;
    border-radius: var(--radius-sm);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .comparison-col.without {
    background: #fdf2f2;
    border: 1px solid #f0d4d4;
  }

  .comparison-col.with {
    background: #f0f9f2;
    border: 1px solid #c8e6cf;
  }

  .comparison-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .comparison-col.without .comparison-label { color: #a33; }
  .comparison-col.with .comparison-label { color: #2a7; }

  .comparison-col img {
    width: 100%;
    border-radius: 4px;
  }

  .comparison-col p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ─── STATES ─── */
  .state-message {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  .state-icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
    opacity: 0.5;
  }

  .state-message a {
    color: var(--wip);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }

  .state-message a:hover { text-decoration: underline; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 700px) {
    h1 { font-size: 26px; }
    header { padding: 32px 0 24px; }
    .container { padding: 0 12px; }
    .table-wrap { border-radius: 0; border-left: 0; border-right: 0; }

    /* Hide notes column on mobile */
    .col-notes, th:nth-child(5) { display: none; }

    table { font-size: 13px; }
    thead th, tbody td { padding: 10px 10px; }

    .comparison-panel { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <span class="header-eyebrow">Mohamed Hussein</span>
    <h1>Tools &amp; Skills</h1>
    <p class="subtitle" id="subtitle">Loading...</p>
  </div>
</header>

<div class="container">
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Status</span>
      <button class="filter-btn active" data-group="status" data-status="all">All</button>
      <button class="filter-btn" data-group="status" data-status="done">Done</button>
      <button class="filter-btn" data-group="status" data-status="needs-improvement">Needs Improvement</button>
      <button class="filter-btn" data-group="status" data-status="wip">WIP</button>
      <button class="filter-btn" data-group="status" data-status="planned">Planned</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Type</span>
      <button class="filter-btn active" data-group="type" data-type="all">All</button>
      <button class="filter-btn" data-group="type" data-type="skill">Skill</button>
      <button class="filter-btn" data-group="type" data-type="tool">Tool</button>
      <button class="filter-btn" data-group="type" data-type="workflow">Workflow</button>
      <button class="filter-btn" data-group="type" data-type="library">Library</button>
    </div>
  </div>

  <div class="table-wrap">
    <div id="table-container"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var container = document.getElementById('table-container');
  var subtitle = document.getElementById('subtitle');
  var items = [];
  var activeStatus = 'all';
  var activeType = 'all';

  var STATUS_PRIORITY = { done: 0, 'needs-improvement': 1, wip: 2, planned: 3 };
  var STATUS_LABELS = { done: 'Done', 'needs-improvement': 'Needs Improvement', wip: 'WIP', planned: 'Planned' };
  var VALID_STATUSES = ['done', 'needs-improvement', 'wip', 'planned'];
  var VALID_TYPES = ['skill', 'tool', 'workflow', 'library'];

  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function isImage(val) {
    if (!val || typeof val !== 'string') return false;
    return /\.(png|jpg|gif|webp)$/i.test(val.trim());
  }

  function renderComparisonContent(val) {
    if (isImage(val)) {
      return '<img src="' + escapeHtml(val) + '" alt="Comparison" loading="lazy">';
    }
    return '<p>' + escapeHtml(val) + '</p>';
  }

  // ─── Data Loading ───
  function load() {
    container.innerHTML = '<div class="state-message"><span class="state-icon">&#8987;</span>Loading...</div>';
    fetch('./tracker.json')
      .then(function(r) {
        if (!r.ok) throw new Error(r.statusText);
        return r.json();
      })
      .then(function(data) {
        items = data;
        if (!items.length) {
          container.innerHTML = '<div class="state-message"><span class="state-icon">&#9744;</span>No items tracked yet.</div>';
          subtitle.textContent = '0 items';
          return;
        }
        items.sort(function(a, b) {
          var pa = STATUS_PRIORITY[a.status] || 99;
          var pb = STATUS_PRIORITY[b.status] || 99;
          if (pa !== pb) return pa - pb;
          return a.name.localeCompare(b.name);
        });
        render();
      })
      .catch(function() {
        container.innerHTML = '<div class="state-message"><span class="state-icon">&#9888;</span>Could not load tracker data.<br><a href="#" onclick="location.reload();return false;">Retry</a></div>';
        subtitle.textContent = '';
      });
  }

  // ─── Filtering ───
  function getFiltered() {
    return items.filter(function(item) {
      var matchStatus = activeStatus === 'all' || item.status === activeStatus;
      var matchType = activeType === 'all' || item.type === activeType;
      return matchStatus && matchType;
    });
  }

  function updateSubtitle(filtered) {
    var total = items.length;
    var showing = filtered.length;
    var counts = {};
    items.forEach(function(item) {
      counts[item.status] = (counts[item.status] || 0) + 1;
    });
    var parts = [];
    ['done', 'needs-improvement', 'wip', 'planned'].forEach(function(s) {
      if (counts[s]) parts.push(counts[s] + ' ' + STATUS_LABELS[s].toLowerCase());
    });
    if (activeStatus === 'all' && activeType === 'all') {
      subtitle.textContent = total + ' items \u2014 ' + parts.join(', ');
    } else {
      subtitle.textContent = 'Showing ' + showing + ' of ' + total + ' items';
    }
  }

  function imageUrl(item) {
    return 'assets/' + item.id + '.png';
  }

  // ─── Build Detail Content ───
  function buildDetailHtml(item) {
    var left = '<div class="detail-left">';
    left += '<img class="detail-image" src="' + imageUrl(item) + '" alt="' + escapeHtml(item.name) + ' illustration" loading="lazy">';
    left += '</div>';

    var right = '<div class="detail-right">';

    if (item.detailedDescription) {
      right += '<div><div class="detail-section-label">About</div><div class="detail-description">' + escapeHtml(item.detailedDescription) + '</div></div>';
    }

    if (item.link) {
      right += '<div class="detail-link"><div class="detail-section-label">Web App</div><a href="' + escapeHtml(item.link) + '" target="_blank" rel="noopener">' + escapeHtml(item.link) + '</a></div>';
    }

    if (item.notes) {
      right += '<div><div class="detail-section-label">Notes</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.5">' + escapeHtml(item.notes) + '</div></div>';
    }

    if (item.examples && item.examples.length) {
      var lis = item.examples.map(function(ex) {
        var label = ex.label || ex.url || ex;
        var url = ex.url || ex;
        return '<li><a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(label) + '</a></li>';
      }).join('');
      right += '<div class="detail-examples"><div class="detail-section-label">Examples</div><ul>' + lis + '</ul></div>';
    }

    if (item.comparison) {
      right += '<div><div class="detail-section-label">Comparison</div>' +
        '<div class="comparison-panel">' +
        '<div class="comparison-col without"><span class="comparison-label">Without</span>' + renderComparisonContent(item.comparison.without) + '</div>' +
        '<div class="comparison-col with"><span class="comparison-label">With</span>' + renderComparisonContent(item.comparison.with) + '</div>' +
        '</div></div>';
    }

    right += '</div>';

    return left + right;
  }

  // ─── Rendering ───
  function render() {
    var filtered = getFiltered();
    updateSubtitle(filtered);

    if (!filtered.length) {
      container.innerHTML = '<div class="state-message"><span class="state-icon">&#9655;</span>No items match the current filters.</div>';
      return;
    }

    var html = '<table><thead><tr>' +
      '<th>Name</th>' +
      '<th>Type</th>' +
      '<th>Status</th>' +
      '<th>Description</th>' +
      '<th>Notes</th>' +
      '</tr></thead><tbody>';

    filtered.forEach(function(item, i) {
      var safeStatus = VALID_STATUSES.indexOf(item.status) !== -1 ? item.status : 'unknown';
      var safeType = VALID_TYPES.indexOf(item.type) !== -1 ? item.type : 'unknown';
      var statusLabel = STATUS_LABELS[item.status] || escapeHtml(item.status);
      var typeLabel = escapeHtml(safeType.charAt(0).toUpperCase() + safeType.slice(1));
      var hasDetail = true; // all rows have illustration images
      var rowId = 'row-' + i;
      var detailId = 'detail-' + i;

      // Main row
      html += '<tr id="' + rowId + '"' + (hasDetail ? ' class="expandable" tabindex="0" role="button" aria-expanded="false" aria-controls="' + detailId + '"' : '') + '>';
      html += '<td class="col-name">';
      html += '<svg class="expand-icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>';
      html += '<img class="skill-thumb" src="' + imageUrl(item) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
      html += escapeHtml(item.name) + '</td>';
      html += '<td><span class="badge-type">' + typeLabel + '</span></td>';
      html += '<td><span class="badge-status ' + safeStatus + '">' + statusLabel + '</span></td>';
      html += '<td class="col-desc">' + escapeHtml(item.description) + '</td>';
      html += '<td class="col-notes">' + escapeHtml(item.notes || '') + '</td>';
      html += '</tr>';

      // Detail row (hidden by default)
      if (hasDetail) {
        html += '<tr id="' + detailId + '" class="detail-row"><td colspan="5"><div class="detail-content">' + buildDetailHtml(item) + '</div></td></tr>';
      }
    });

    html += '</tbody></table>';
    container.innerHTML = html;

    // Attach expand/collapse handlers
    container.querySelectorAll('tr.expandable').forEach(function(row) {
      var detailRow = row.nextElementSibling;
      function toggle(e) {
        if (e.target.tagName === 'A') return;
        var expanded = row.classList.toggle('expanded');
        row.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        detailRow.classList.toggle('visible', expanded);
      }
      row.addEventListener('click', toggle);
      row.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle(e);
        }
      });
    });
  }

  // ─── Filter Buttons ───
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var group = btn.dataset.group;
      document.querySelectorAll('.filter-btn[data-group="' + group + '"]').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      if (group === 'status') {
        activeStatus = btn.dataset.status;
      } else {
        activeType = btn.dataset.type;
      }
      render();
    });
  });

  // ─── Init ───
  load();
})();
</script>

</body>
</html>
